title: Moonwalk
author: Abhinav Saxena
lang: en
url: https://www.abhinavsaxena.com # root address of the site
baseurl: "/moonwalk/" # set to "/moonwalk" if hosting under a project subpath
description: > # description of the site (multiple lines allowed)
  Moonwalk is a fast and elegant Jekyll theme with a clean dark mode. It comes with horizontal list (for navbar and footer), card list (for portfolio), and a generic vertical list. It is very easy to modify in case you want to build over it - please see _layouts/home.html to do that.

permalink: /:slug

twitter:
  username: abhinav # update or delete this
  card: summary_large_image

theme: moonwalk

theme_config:
  appearance: "auto" # can be "light", "dark" or "auto"
  appearance_toggle: true # if appearance can be switched by user
  date_format: "%Y-%m-%d" # customize how date is formatted
  home_url: "/"
  tag_path: "/tags/:tag/"
  tag_slug_mode: "pretty"
  use_legacy_tag_url_filter: false # set true when the site provides a legacy_tag_url Liquid filter
  accent:
    light: "#4f46e5"
    dark: "#91a7ff"
    selection_light: "#ffecb2"
    selection_dark: "#41c7c7"
  favicon:
    enabled: false
    apple_touch_icon: "/assets/images/favicon/apple-touch-icon.png"
    icon_32: "/assets/images/favicon/favicon-32x32.png"
    icon_16: "/assets/images/favicon/favicon-16x16.png"
    manifest: "/assets/images/favicon/site.webmanifest"
    mask_icon: "/assets/images/favicon/safari-pinned-tab.svg"
    mask_color: "#5bbad5"
    shortcut_icon: "/assets/images/favicon/favicon.ico"
    browserconfig: "/assets/images/favicon/browserconfig.xml"
    tile_color: "#00aba9"
    theme_color: "#ffffff"
  search:
    index_url: "/search.json"
    max_results: 8
  show_theme_credit: true
  show_description: true # show blog description
  show_navbar: true # show horizontal navbar
  show_footer: true # show footer links in home page,add in _data/home.yml
  show_copyright: true # show copyright notice in footer
  # following keys are using to create home layout
  show_projects: true # show projects as cards, add in _data/home.yml
  show_blog: true # show blog posts added in _posts
  show_old_projects: true # show old projects as cards, add in _data/home.yml
  show_misc_list: false # show generic vertical list for misc details, add _data/home.yml
  show_reading_time: false # CJK-aware sites should provide their own reading-time calculation
  show_tags: true # show tags in a blog posts
  show_code_copy: true # show copy button on code blocks
  show_progress_bar: true # show reading progress bar on posts
  show_back_to_top: true # show back-to-top button
  show_post_nav: true # show prev/next links on posts
  show_toc: true # allow per-post table of contents via toc: true front matter
  toc_open: false # keep the table of contents collapsed by default
  show_footnote_tooltips: false # show footnote text on hover instead of scrolling to bottom
  show_link_previews: false # show preview cards when hovering internal post links
  # options for "home" page
  home:
    title_projects: Portfolio
    title_misc_list: Details
    title_blog: Blog
    title_old_projects: Old Projects

highlighter: rouge

sass:
  style: :compressed

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
