{% assign moonwalk_lang = page.lang | default: site.lang | default: "en" %}
{% assign moonwalk_locale = site.data.moonwalk_locales[moonwalk_lang] | default: site.data.moonwalk_locales.en %}
<script>
(function() {
  document.querySelectorAll('div.highlighter-rouge').forEach(function(block) {
    block.style.position = 'relative';

    // Language label derived from rouge's language-* class
    var langClass = Array.from(block.classList).find(function(c) {
      return c.indexOf('language-') === 0 && c !== 'language-plaintext';
    });
    if (langClass) {
      var label = document.createElement('span');
      label.className = 'code-lang';
      label.textContent = langClass.replace('language-', '');
      block.appendChild(label);
    }

    var btn = document.createElement('button');
    btn.className = 'code-copy';
    btn.setAttribute('aria-label', {{ moonwalk_locale.copy_code | jsonify }});
    btn.textContent = {{ moonwalk_locale.copy | jsonify }};
    btn.addEventListener('click', function() {
      var code = block.querySelector('code');
      navigator.clipboard.writeText(code.innerText).then(function() {
        btn.textContent = {{ moonwalk_locale.copied | jsonify }};
        setTimeout(function() { btn.textContent = {{ moonwalk_locale.copy | jsonify }}; }, 2000);
      });
    });
    block.appendChild(btn);
  });
})();
</script>
